# .github/workflows/daily_scan.yml
# 每個交易日美東 18:00 (UTC 23:00) 自動掃描

name: Daily Trend Scan

on:
  schedule:
    # UTC 23:00 = EST 18:00 (冬令) / EDT 19:00 (夏令)
    - cron: "0 23 * * 1-5"  # 週一至週五

  workflow_dispatch:  # 允許手動觸發

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            cache/
          key: ohlcv-cache-${{ github.run_number }}
          restore-keys: |
            ohlcv-cache-

      - name: Restore stage history
        uses: actions/cache@v4
        with:
          path: |
            cache/stage_history.json
          key: stage-history-${{ github.run_number }}
          restore-keys: |
            stage-history-

      - name: Clean bad universe cache
        run: |
          if [ -f cache/universe.json ]; then
            SIZE=$(wc -c < cache/universe.json)
            if [ "$SIZE" -lt 100 ]; then
              echo "Removing empty/bad universe cache"
              rm cache/universe.json
            fi
          fi

      - name: Run daily scan
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_scan.py --always-send

      - name: Save score snapshot
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            cache/
          key: ohlcv-cache-${{ github.run_number }}

      - name: Save stage history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            cache/stage_history.json
          key: stage-history-${{ github.run_number }}

      - name: Report status
        if: failure()
        run: echo "::error::Daily trend scan failed. Check logs."
